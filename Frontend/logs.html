<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Classroom Logs</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body data-page="logs">
    <header class="site-header">
      <div class="header-content">
        <h1 class="logo">Smart Classroom Automation</h1>
        <nav class="main-nav">
          <a href="home.html" class="nav-link">Home</a>
          <a href="dashboard.html" class="nav-link">Dashboard</a>
          <a href="contact.html" class="nav-link">Contact</a>
          <a href="login.html" class="nav-link">Login</a>
        </nav>
      </div>
    </header>

    <main class="page-content">
      <div class="page-shell">
        <section class="hero-panel">
          <div class="hero-copy-block">
            <p class="eyebrow">Decision History</p>
            <h2>Readable automation logs for demo, review, and viva explanation.</h2>
            <p class="hero-copy">
              Each entry explains what the system observed and why it changed fan or lighting behavior.
            </p>
          </div>
        </section>

        <section class="panel-card">
          <div class="panel-head"><h3>Recent Decisions</h3></div>
          <ul id="fullLogList" class="history-list expanded"></ul>
        </section>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
